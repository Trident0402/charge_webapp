<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f7667" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="資產總覽" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>資產總覽</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/pdf-export.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <button class="icon-button is-hidden" id="backButton" type="button" aria-label="返回">
          <span aria-hidden="true">‹</span>
        </button>
        <div class="app-title-block">
          <h1 id="appTitle">資產總覽</h1>
          <p id="appSubtitle">離線資產管理</p>
        </div>
      </header>

      <main class="app-main">
        <section class="view is-active" id="view-home" aria-labelledby="homeTitle">
          <h2 class="sr-only" id="homeTitle">首頁</h2>
          <div id="homeSummary"></div>
          <div class="section-heading">
            <h2 id="accountSectionTitle">資產帳戶</h2>
            <button class="primary-button" id="openAccountFormButton" type="button">新增帳戶</button>
          </div>
          <div class="account-section" id="accountFolderList"></div>
        </section>

        <section class="view" id="view-account-detail" aria-labelledby="accountDetailTitle">
          <div id="accountDetail"></div>
        </section>

        <section class="view" id="view-account-form" aria-labelledby="accountFormTitle">
          <div class="panel">
            <h2 id="accountFormTitle">新增帳戶</h2>
            <form id="accountForm" class="form-stack">
              <input type="hidden" id="accountId" />
              <label>
                帳戶名稱
                <input id="accountName" name="name" type="text" autocomplete="off" required />
              </label>
              <label>
                帳戶類型
                <select id="accountType" name="type" required>
                  <option value="bank">銀行帳戶</option>
                  <option value="linepay">行動支付</option>
                  <option value="wallet">錢包</option>
                  <option value="stock">股票帳戶</option>
                  <option value="crypto">虛擬貨幣帳戶</option>
                  <option value="liability">負債帳戶</option>
                  <option value="other">其他</option>
                </select>
              </label>
              <label id="accountInitialBalanceField">
                <span id="accountInitialBalanceLabel">初始金額</span>
                <input id="accountInitialBalance" name="initialBalance" type="number" inputmode="decimal" step="1" value="0" required />
              </label>
              <div class="form-stack is-hidden" id="liabilityAccountSettings">
                <div class="form-grid">
                  <label>
                    年利率（%）
                    <input id="accountAnnualInterestRate" name="annualInterestRate" type="number" inputmode="decimal" step="0.0001" value="0" />
                  </label>
                  <label>
                    還款期數（月）
                    <input id="accountRepaymentMonths" name="repaymentMonths" type="number" inputmode="numeric" step="1" min="0" value="0" />
                  </label>
                </div>
                <div class="metric liability-payment-estimate">
                  <span>估算每月還款</span>
                  <strong id="liabilityPaymentEstimate">$0</strong>
                </div>
              </div>
              <div class="form-stack is-hidden" id="bankAccountSettings">
                <label class="checkbox-label">
                  <input id="bankFeeEnabled" name="bankFeeEnabled" type="checkbox" />
                  啟用轉帳手續費
                </label>
                <div class="form-grid">
                  <label>
                    轉帳手續費
                    <input id="bankTransferFee" name="bankTransferFee" type="number" inputmode="decimal" step="1" min="0" value="0" />
                  </label>
                  <label>
                    提領手續費
                    <input id="bankWithdrawalFee" name="bankWithdrawalFee" type="number" inputmode="decimal" step="1" min="0" value="0" />
                  </label>
                </div>
              </div>
              <label>
                備註
                <textarea id="accountNote" name="note" rows="3"></textarea>
              </label>
              <div class="button-row">
                <button class="secondary-button" type="button" data-nav="home">取消</button>
                <button class="primary-button" type="submit">儲存</button>
              </div>
            </form>
          </div>
        </section>

        <section class="view" id="view-transaction-form" aria-labelledby="transactionFormTitle">
          <div class="panel">
            <h2 id="transactionFormTitle">新增紀錄</h2>
            <form id="transactionForm" class="form-stack">
              <input type="hidden" id="transactionId" />
              <input type="hidden" id="transactionAccountId" />
              <label>
                類型
                <select id="transactionType" name="type" required>
                  <option value="income">收入</option>
                  <option value="expense">支出</option>
                </select>
              </label>
              <label>
                金額
                <input id="transactionAmount" name="amount" type="number" inputmode="decimal" step="1" required />
              </label>
              <div class="form-stack is-hidden" id="transactionFeeSettings">
                <label class="checkbox-label">
                  <input id="includeTransferFee" name="includeTransferFee" type="checkbox" />
                  加入轉帳手續費
                </label>
                <label class="is-hidden" id="transactionFeeAmountField">
                  轉帳手續費
                  <input id="transactionTransferFee" name="transactionTransferFee" type="number" inputmode="decimal" step="1" min="0" value="0" />
                </label>
              </div>
              <label>
                日期
                <input id="transactionDate" name="date" type="date" required />
              </label>
              <label>
                分類
                <input id="transactionCategory" name="category" type="text" autocomplete="off" list="transactionCategoryList" placeholder="選擇或輸入分類 tag" />
              </label>
              <datalist id="transactionCategoryList"></datalist>
              <label>
                備註
                <textarea id="transactionNote" name="note" rows="3"></textarea>
              </label>
              <div class="button-row">
                <button class="secondary-button" type="button" data-back-account>取消</button>
                <button class="primary-button" type="submit">儲存</button>
              </div>
              <button class="danger-button is-hidden" id="deleteTransactionButton" type="button">刪除這筆紀錄</button>
            </form>
          </div>
        </section>

        <section class="view" id="view-transfer-form" aria-labelledby="transferFormTitle">
          <div class="panel">
            <h2 id="transferFormTitle">帳戶轉帳</h2>
            <form id="transferForm" class="form-stack">
              <input type="hidden" id="transferId" />
              <input type="hidden" id="transferFromAccountId" />
              <label>
                轉入帳戶
                <select id="transferToAccountId" name="toAccountId" required></select>
              </label>
              <label>
                金額
                <input id="transferAmount" name="amount" type="number" inputmode="decimal" step="1" required />
              </label>
              <label>
                日期
                <input id="transferDate" name="date" type="date" required />
              </label>
              <label>
                原因
                <textarea id="transferReason" name="reason" rows="3" placeholder="例如：生活費、投資款、帳戶整理"></textarea>
              </label>
              <div class="button-row">
                <button class="secondary-button" type="button" data-back-account>取消</button>
                <button class="primary-button" type="submit">儲存</button>
              </div>
              <button class="danger-button is-hidden" id="deleteTransferButton" type="button">刪除這筆轉帳</button>
            </form>
          </div>
        </section>

        <section class="view" id="view-stock-trade-form" aria-labelledby="stockTradeFormTitle">
          <div class="panel">
            <h2 id="stockTradeFormTitle">新增股票交易</h2>
            <form id="stockTradeForm" class="form-stack">
              <input type="hidden" id="stockTradeId" />
              <input type="hidden" id="stockTradeAccountId" />
              <label>
                類型
                <select id="stockTradeType" name="type" required>
                  <option value="buy">買入</option>
                  <option value="sell">賣出</option>
                </select>
              </label>
              <div class="form-grid">
                <label>
                  股票代號
                  <input id="stockSymbol" name="symbol" type="text" autocomplete="off" list="stockSymbolList" required />
                </label>
                <label>
                  股票名稱
                  <input id="stockName" name="name" type="text" autocomplete="off" list="stockNameList" required />
                </label>
              </div>
              <datalist id="stockSymbolList"></datalist>
              <datalist id="stockNameList"></datalist>
              <div class="form-grid">
                <label>
                  股數
                  <input id="stockShares" name="shares" type="number" inputmode="decimal" step="0.0001" required />
                </label>
                <label>
                  價格
                  <input id="stockPrice" name="price" type="number" inputmode="decimal" step="0.01" required />
                </label>
              </div>
              <div class="form-grid">
                <label>
                  手續費
                  <input id="stockFee" name="fee" type="number" inputmode="decimal" step="1" value="0" />
                </label>
                <label>
                  稅費
                  <input id="stockTax" name="tax" type="number" inputmode="decimal" step="1" value="0" />
                </label>
              </div>
              <label>
                日期
                <input id="stockTradeDate" name="date" type="date" required />
              </label>
              <div class="button-row">
                <button class="secondary-button" type="button" data-back-account>取消</button>
                <button class="primary-button" type="submit">儲存</button>
              </div>
              <button class="danger-button is-hidden" id="deleteStockTradeButton" type="button">刪除這筆股票交易</button>
            </form>
          </div>
        </section>

        <section class="view" id="view-stock-price-form" aria-labelledby="stockPriceFormTitle">
          <div class="panel">
            <h2 id="stockPriceFormTitle">新增每日市價</h2>
            <form id="stockPriceForm" class="form-stack">
              <input type="hidden" id="stockPriceId" />
              <input type="hidden" id="stockPriceAccountId" />
              <label>
                股票代號
                <input id="priceStockSymbol" name="symbol" type="text" autocomplete="off" list="stockSymbolList" required />
              </label>
              <label>
                市價
                <input id="manualStockPrice" name="price" type="number" inputmode="decimal" step="0.01" required />
              </label>
              <label>
                日期
                <input id="manualStockPriceDate" name="date" type="date" required />
              </label>
              <label>
                備註
                <textarea id="stockPriceNote" name="note" rows="3"></textarea>
              </label>
              <div class="button-row">
                <button class="secondary-button" type="button" data-back-account>取消</button>
                <button class="primary-button" type="submit">儲存</button>
              </div>
              <button class="danger-button is-hidden" id="deleteStockPriceButton" type="button">刪除這筆市價紀錄</button>
            </form>
          </div>
        </section>

        <section class="view" id="view-crypto-trade-form" aria-labelledby="cryptoTradeFormTitle">
          <div class="panel">
            <h2 id="cryptoTradeFormTitle">新增虛擬貨幣交易</h2>
            <form id="cryptoTradeForm" class="form-stack">
              <input type="hidden" id="cryptoTradeId" />
              <input type="hidden" id="cryptoTradeAccountId" />
              <label>
                類型
                <select id="cryptoTradeType" name="type" required>
                  <option value="buy">買入</option>
                  <option value="sell">賣出</option>
                  <option value="profit">純利潤</option>
                </select>
              </label>
              <div class="form-grid">
                <label>
                  幣種代號
                  <input id="cryptoSymbol" name="symbol" type="text" autocomplete="off" list="cryptoSymbolList" placeholder="BTC" required />
                </label>
                <label>
                  幣種名稱
                  <input id="cryptoName" name="name" type="text" autocomplete="off" list="cryptoNameList" placeholder="Bitcoin" required />
                </label>
              </div>
              <datalist id="cryptoSymbolList"></datalist>
              <datalist id="cryptoNameList"></datalist>
              <div class="form-grid">
                <label>
                  數量
                  <input id="cryptoQuantity" name="quantity" type="number" inputmode="decimal" step="0.00000001" required />
                </label>
                <label>
                  美元單價 / 金額
                  <input id="cryptoPriceUsd" name="priceUsd" type="number" inputmode="decimal" step="0.000001" required />
                </label>
              </div>
              <div class="form-grid">
                <label>
                  台幣美金匯率
                  <input id="cryptoFxRate" name="fxRate" type="number" inputmode="decimal" step="0.0001" required />
                </label>
                <label>
                  手續費（美元）
                  <input id="cryptoFeeUsd" name="feeUsd" type="number" inputmode="decimal" step="0.000001" value="0" />
                </label>
              </div>
              <label>
                日期
                <input id="cryptoTradeDate" name="date" type="date" required />
              </label>
              <div class="button-row">
                <button class="secondary-button" type="button" data-back-account>取消</button>
                <button class="primary-button" type="submit">儲存</button>
              </div>
              <button class="danger-button is-hidden" id="deleteCryptoTradeButton" type="button">刪除這筆虛擬貨幣交易</button>
            </form>
          </div>
        </section>

        <section class="view" id="view-crypto-price-form" aria-labelledby="cryptoPriceFormTitle">
          <div class="panel">
            <h2 id="cryptoPriceFormTitle">新增虛擬貨幣市價</h2>
            <form id="cryptoPriceForm" class="form-stack">
              <input type="hidden" id="cryptoPriceId" />
              <input type="hidden" id="cryptoPriceAccountId" />
              <label>
                幣種代號
                <input id="priceCryptoSymbol" name="symbol" type="text" autocomplete="off" list="cryptoSymbolList" placeholder="BTC" required />
              </label>
              <div class="form-grid">
                <label>
                  美元市價
                  <input id="manualCryptoPriceUsd" name="priceUsd" type="number" inputmode="decimal" step="0.000001" required />
                </label>
                <label>
                  台幣美金匯率
                  <input id="manualCryptoFxRate" name="fxRate" type="number" inputmode="decimal" step="0.0001" required />
                </label>
              </div>
              <label>
                日期
                <input id="manualCryptoPriceDate" name="date" type="date" required />
              </label>
              <label>
                備註
                <textarea id="cryptoPriceNote" name="note" rows="3"></textarea>
              </label>
              <div class="button-row">
                <button class="secondary-button" type="button" data-back-account>取消</button>
                <button class="primary-button" type="submit">儲存</button>
              </div>
              <button class="danger-button is-hidden" id="deleteCryptoPriceButton" type="button">刪除這筆虛擬貨幣市價紀錄</button>
            </form>
          </div>
        </section>

        <section class="view" id="view-expected-income" aria-labelledby="expectedIncomeTitle">
          <div id="expectedIncomePage"></div>
        </section>

        <section class="view" id="view-monthly-report" aria-labelledby="monthlyReportTitle">
          <div id="monthlyReportPage"></div>
        </section>

        <section class="view" id="view-settings" aria-labelledby="settingsTitle">
          <div id="settingsPage"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主要導覽">
        <button type="button" data-nav="home">首頁</button>
        <button type="button" data-nav="expected-income">預期收支</button>
        <button type="button" data-nav="monthly-report">月報表</button>
        <button type="button" data-nav="settings">設定</button>
      </nav>
    </div>

    <script src="./js/version.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
